# backend/alembic.ini
[alembic]
# L'URL est surchargée dynamiquement dans env.py via config.py
# Elle est donc ignorée ici, mais doit être présente.
script_location = alembic
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@db:5432/rag

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
